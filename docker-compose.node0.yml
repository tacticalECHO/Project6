services:
  postgres:
    image: postgres:15
    container_name: traffic-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: traffic-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    container_name: traffic-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: traffic-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: traffic-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      mc mb --ignore-existing local/traffic-raw;
      echo 'Bucket traffic-raw ready.'
      "
    restart: on-failure

  airflow-init:
    build: .
    container_name: traffic-airflow-init
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@10.10.8.10:5432/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:@10.10.8.10:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@10.10.8.10:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "wHnhx4qglKUMQjP0yEFEhGvU_4IIPK7Jk03tR_tTH3M="
      AIRFLOW__WEBSERVER__SECRET_KEY: "DEproject"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      MONGO_URI: mongodb://10.10.8.10:27017/
      MINIO_ENDPOINT: 10.10.8.10:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: traffic-raw
      PYTHONPATH: /opt/airflow
    volumes: &airflow-vols
      - ./app:/opt/airflow/app
      - ./config:/opt/airflow/config
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    depends_on:
      - postgres
      - redis
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin
      --firstname admin --lastname user --role Admin --email admin@example.com"

  airflow-webserver:
    build: .
    container_name: traffic-airflow-webserver
    environment: *airflow-env
    volumes: *airflow-vols
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - airflow-init
    command: webserver

  airflow-scheduler:
    build: .
    container_name: traffic-airflow-scheduler
    environment: *airflow-env
    volumes: *airflow-vols
    depends_on:
      - postgres
      - redis
      - airflow-init
    command: scheduler

volumes:
  postgres_data:
  mongo_data:
  minio_data:
